<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #root { position: fixed; inset: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>

<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "three": "https://esm.sh/three@0.157.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.0",
    "@react-spring/three": "https://esm.sh/@react-spring/three@9.7.3",
    "@shadergradient/react": "https://esm.sh/@shadergradient/react@2.0.0"
  }
}
</script>

<script type="module">
  import React from 'react';
  import { createRoot } from 'react-dom/client';
  import { ShaderGradientCanvas, ShaderGradient } from '@shadergradient/react';

  const App = () =>
    React.createElement(
      ShaderGradientCanvas,
      { style: { width: '100%', height: '100%' } },
      React.createElement(ShaderGradient, {
        control: 'props',
        animate: 'on',
        type: 'waterPlane',
        color1: '#fecfff',
        color2: '#9cffee',
        color3: '#ffffff',
        bgColor1: '#000000',
        bgColor2: '#000000',
        brightness: 1.2,
        cAzimuthAngle: 170,
        cPolarAngle: 70,
        cDistance: 4.4,
        cameraZoom: 1,
        positionX: 0,
        positionY: 0.9,
        positionZ: -0.3,
        rotationX: 45,
        rotationY: 0,
        rotationZ: 0,
        uDensity: 1.2,
        uFrequency: 0,
        uSpeed: 0.2,
        uStrength: 3.4,
        uAmplitude: 0,
        reflection: 0.1,
        envPreset: 'city',
        lightType: '3d',
        grain: 'off'
      })
    );

  createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

</body>
</html>
