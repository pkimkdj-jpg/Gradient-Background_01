<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000000; overflow: hidden; }
  #root { position: fixed; inset: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import React, { useState, useEffect } from 'https://esm.sh/react@18.3.1';
  import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1';
  import { ShaderGradientCanvas, ShaderGradient } from 'https://esm.sh/@shadergradient/react@2.0.0?deps=react@18.3.1,react-dom@18.3.1,@react-three/fiber@8.15.0,three@0.157.0&bundle';

  const COLORS = [
    { color1: '#00a3c7', color2: '#000b88', color3: '#00005d' },
    { color1: '#c700a3', color2: '#880b00', color3: '#5d0000' },
    { color1: '#00c75a', color2: '#0b8800', color3: '#005d1a' }
  ];

  const App = () => {
    const [colorIndex, setColorIndex] = useState(0);

    useEffect(() => {
      window.addEventListener('message', (event) => {
        console.log('[Gradient received message]:', event.data);
        if (event.data.type === 'gradient:nextColor') {
          setColorIndex((prev) => (prev + 1) % COLORS.length);
        }
      });
    }, []);

    const current = COLORS[colorIndex];

    return React.createElement(
      ShaderGradientCanvas,
      { style: { width: '100%', height: '100%' } },
      React.createElement(ShaderGradient, {
        control: 'props', animate: 'on', enableTransition: false,
        type: 'waterPlane',
        color1: current.color1,
        color2: current.color2,
        color3: current.color3,
        bgColor1: '#000000', bgColor2: '#000000',
        brightness: 1.5, cAzimuthAngle: 0, cPolarAngle: 100, cDistance: 4.2,
        cameraZoom: 1, positionX: 0, positionY: 0, positionZ: 0,
        rotationX: 0, rotationY: 0, rotationZ: -20,
        uDensity: 1.3, uFrequency: 1, uSpeed: 0.2, uStrength: 1, uAmplitude: 1,
        reflection: 0.1, envPreset: 'city', lightType: '3d', grain: 'off'
      })
    );
  };
  createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
