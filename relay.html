<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: transparent;
    cursor: pointer;
  }
</style>
</head>
<body>
<script>
  document.body.addEventListener('click', function () {
    // Post to parent
    try { window.parent.postMessage({ type: 'gradient:nextColor' }, '*'); } catch(e) {}
    // Post to all siblings
    try {
      var frames = window.parent.frames;
      for (var i = 0; i < frames.length; i++) {
        try { frames[i].postMessage({ type: 'gradient:nextColor' }, '*'); } catch(e) {}
      }
    } catch(e) {}
    // Post to grandparent and its frames
    try { 
      var grandparent = window.parent.parent;
      grandparent.postMessage({ type: 'gradient:nextColor' }, '*');
      var gpFrames = grandparent.frames;
      for (var j = 0; j < gpFrames.length; j++) {
        try { gpFrames[j].postMessage({ type: 'gradient:nextColor' }, '*'); } catch(e) {}
      }
    } catch(e) {}
  });
</script>
</body>
</html>
